name: Deploy Essaypig

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      DS_API_URL: ${{ secrets.DS_API_URL }}
      DS_API_KEY: ${{ secrets.DS_API_KEY }}
      DS_MODEL: ${{ secrets.DS_MODEL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
      NODE_ENV: ${{ secrets.NODE_ENV }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      # The droplet is a 1GB box running nginx and the server; a Vite build
      # peaks around 600MB there and gets OOM-killed. Build here instead and
      # ship the output — the droplet only ever needs to serve it.
      # NODE_ENV is production for this job, which makes Yarn skip
      # devDependencies — but the build needs vite, tsc and @types/*.
      - name: Install dependencies
        run: yarn install --frozen-lockfile --production=false

      - name: Build
        run: |
          # Vite inlines these at build time, so they have to exist wherever
          # the build runs — which is now here, not the droplet
          cat > client/.env <<ENV
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          ENV

          yarn workspace client build
          yarn workspace server build

          # nginx has no MIME type for .mjs and serves it as octet-stream, which
          # browsers refuse to execute as a module. Catch it here, not in prod.
          if find client/dist -name '*.mjs' | grep -q .; then
            echo "::error::.mjs assets emitted — nginx will serve these as octet-stream"
            find client/dist -name '*.mjs'
            exit 1
          fi

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy via SSH (no nvm)
        run: |
          ssh -o StrictHostKeyChecking=no -T ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} 'bash -s' <<'EOF'
          set -euo pipefail
          set -x
          trap 'echo "❌ failed at: $BASH_COMMAND"; exit 1' ERR

          # Ensure yarn & pm2 exist (use Yarn Classic for --frozen-lockfile)
          if ! command -v yarn >/dev/null 2>&1; then
            sudo npm i -g yarn@1.22.22
          fi
          if ! command -v pm2 >/dev/null 2>&1; then
            sudo npm i -g pm2
          fi

          node -v
          npm -v
          yarn -v
          pm2 -v

          cd /var/www/essaypig

          echo "Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main

          echo "Writing backend .env"
          cat > server/.env <<ENV
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          DS_API_URL=${{ secrets.DS_API_URL }}
          DS_API_KEY=${{ secrets.DS_API_KEY }}
          DS_MODEL=${{ secrets.DS_MODEL }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          NODE_ENV=${{ secrets.NODE_ENV }}
          FIREBASE_SERVICE_ACCOUNT_KEY=${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          ENV

          # Runtime dependencies for the server. The build already happened on
          # the runner; its output is rsynced in by the next step.
          echo "Installing dependencies..."
          yarn install --frozen-lockfile
          EOF

      # --delete clears out hashed asset files left by previous builds
      - name: Ship the build
        run: |
          TARGET="${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}"
          RSH="ssh -o StrictHostKeyChecking=no"

          rsync -az --delete -e "$RSH" client/dist/ "$TARGET:/var/www/essaypig/client/dist/"
          rsync -az --delete -e "$RSH" server/dist/ "$TARGET:/var/www/essaypig/server/dist/"

      - name: Restart the server
        run: |
          ssh -o StrictHostKeyChecking=no -T ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} 'bash -s' <<'EOF'
          set -euo pipefail
          set -x
          trap 'echo "❌ failed at: $BASH_COMMAND"; exit 1' ERR

          cd /var/www/essaypig

          echo "Starting server with PM2..."
          pm2 restart essaypig-server || pm2 start server/dist/index.js --name essaypig-server
          pm2 save

          echo "✅ Deployment complete"
          EOF
